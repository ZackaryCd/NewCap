<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuFile | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            letter-spacing: -0.01em;
        }
        .otp-field { 
            font-family: 'Geist Mono', monospace; 
        }
        input, select { font-weight: 400 !important; }
        
        .transition-smooth { transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1); }
        @media (min-width: 768px) {
            .is-signup .image-side { transform: translateX(100%); }
            .is-signup .form-side { transform: translateX(-100%); }
        }
        .stagger-item { opacity: 0; transform: translateY(15px); transition: all 0.5s ease; }
        .view-active .stagger-item { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.05s; }
        .delay-2 { transition-delay: 0.1s; }
        .delay-3 { transition-delay: 0.15s; }
        .delay-4 { transition-delay: 0.2s; }
        .delay-5 { transition-delay: 0.25s; }
        .delay-6 { transition-delay: 0.3s; }
        .delay-7 { transition-delay: 0.35s; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen bg-[#071330] flex items-center justify-center p-4 overflow-hidden">

    <div class="auth-card relative flex flex-col md:flex-row w-full max-w-[1050px] h-[95vh] md:h-[90vh] max-h-[780px] bg-white rounded-[32px] md:rounded-[48px] shadow-2xl overflow-hidden" id="card">
        
        <div id="toast" class="absolute top-6 left-6 right-6 p-4 rounded-[20px] hidden items-center gap-3 text-sm font-bold z-[100] shadow-lg"></div>

        <div class="side-panel image-side transition-smooth relative z-[3] w-full h-[25%] md:w-1/2 md:h-full bg-[#1e1b4b] overflow-hidden">
            <img src="../PICS/front.jpeg" class="absolute inset-0 w-full h-full object-cover opacity-60 scale-110" id="hero-img" onerror="this.src='https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070'">
            <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-br from-[#1e1b4b]/90 to-transparent flex flex-col justify-end p-6 md:p-[60px] text-white z-[4]">
                <h1 class="text-2xl md:text-[44px] font-black mb-2 leading-tight uppercase">Eugrace Business Solution</h1>
                <p class="opacity-80 text-xs md:text-[17px] font-light leading-relaxed max-w-[320px] hidden sm:block">Centralized File Management.</p>
            </div>
        </div>

        <div class="side-panel form-side transition-smooth relative z-[2] w-full h-[75%] md:w-1/2 md:h-full bg-white p-6 md:p-[60px] flex flex-col overflow-y-auto">
            <div class="form-container view-active w-full max-w-[380px] mx-auto my-auto" id="form-content">
                
                <div class="stagger-item delay-1">
                    <h2 id="view-title" class="text-3xl md:text-4xl font-black text-slate-900 mb-1">Log In</h2>
                    <p id="view-subtitle" class="text-slate-400 text-sm md:text-[15px] mb-8 font-medium">Secure Authentication Required.</p>
                </div>

                <form id="auth-form" class="space-y-4">
                    <div id="names-row" class="hidden stagger-item flex gap-3 delay-3">
                        <input id="fname" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-[#02b5ff] text-sm" placeholder="First Name">
                        <input id="lname" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-[#02b5ff] text-sm" placeholder="Last Name">
                    </div>

                    <div id="dept-row" class="hidden stagger-item relative delay-4">
                        <select class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-[#02b5ff] appearance-none cursor-pointer text-sm text-slate-500" id="department">
                            <option value="" disabled selected>Select Department</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none border-t-[5px] border-t-slate-300 border-x-[5px] border-x-transparent"></div>
                    </div>

                    <div id="email-group" class="relative stagger-item delay-5">
                        <i data-lucide="mail" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 text-slate-300"></i>
                        <input class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-[#02b5ff] text-sm" type="email" id="email" placeholder="Email Address">
                    </div>

                    <div id="otp-group" class="hidden stagger-item space-y-6 delay-3">
                        <div class="flex justify-between gap-2" id="otp-inputs">
                            <input type="text" maxlength="1" inputmode="numeric" class="otp-field w-12 h-14 text-center text-xl font-bold bg-slate-50 border border-slate-100 rounded-2xl focus:border-[#02b5ff] outline-none transition-all">
                            <input type="text" maxlength="1" inputmode="numeric" class="otp-field w-12 h-14 text-center text-xl font-bold bg-slate-50 border border-slate-100 rounded-2xl focus:border-[#02b5ff] outline-none transition-all">
                            <input type="text" maxlength="1" inputmode="numeric" class="otp-field w-12 h-14 text-center text-xl font-bold bg-slate-50 border border-slate-100 rounded-2xl focus:border-[#02b5ff] outline-none transition-all">
                            <input type="text" maxlength="1" inputmode="numeric" class="otp-field w-12 h-14 text-center text-xl font-bold bg-slate-50 border border-slate-100 rounded-2xl focus:border-[#02b5ff] outline-none transition-all">
                            <input type="text" maxlength="1" inputmode="numeric" class="otp-field w-12 h-14 text-center text-xl font-bold bg-slate-50 border border-slate-100 rounded-2xl focus:border-[#02b5ff] outline-none transition-all">
                            <input type="text" maxlength="1" inputmode="numeric" class="otp-field w-12 h-14 text-center text-xl font-bold bg-slate-50 border border-slate-100 rounded-2xl focus:border-[#02b5ff] outline-none transition-all">
                        </div>
                        <p class="text-center text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                            No Code? <button type="button" id="resend-btn" class="text-[#02b5ff] disabled:opacity-50" disabled>Resend In <span id="timer">60</span>s</button>
                        </p>
                    </div>

                    <div id="pw-group" class="relative stagger-item delay-6">
                        <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 text-slate-300"></i>
                        <input class="w-full pl-12 pr-12 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-[#02b5ff] text-sm" type="password" id="password" placeholder="Password">
                        <button type="button" class="password-toggle absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 hover:text-[#02b5ff]" data-target="password">
                            <i data-lucide="eye" class="w-4"></i>
                        </button>
                    </div>

                    <div id="forgot-wrap" class="stagger-item text-right delay-7">
                        <button type="button" class="text-[#02b5ff] font-black text-xs uppercase tracking-widest hover:underline" id="go-forgot">Forgot Password?</button>
                    </div>

                    <div class="stagger-item delay-7 pt-4">
                        <button class="w-full py-4 bg-[#02b5ff] text-white rounded-2xl font-black text-sm uppercase tracking-[2px] flex items-center justify-center gap-3 shadow-xl hover:bg-[#00a3e8] active:scale-95 transition-all" type="submit" id="submit-btn">
                            <span id="btn-label">Log In</span>
                            <i data-lucide="chevron-right" class="w-4"></i>
                        </button>
                    </div>
                </form>

                <div class="stagger-item mt-8 text-center border-t border-slate-50 pt-8 delay-7">
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">
                        <span id="foot-txt">New User?</span>
                        <button class="text-[#02b5ff] font-black ml-2 hover:underline" id="switch-btn">Create Account</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentMode = 'login';
        const card = document.getElementById('card');
        const content = document.getElementById('form-content');
        const viewTitle = document.getElementById('view-title');
        const viewSubtitle = document.getElementById('view-subtitle');
        const actionLabel = document.getElementById('btn-label');
        const switchBtn = document.getElementById('switch-btn');
        const footerLabel = document.getElementById('foot-txt');
        const mailIn = document.getElementById('email');
        const passIn = document.getElementById('password');
        const otpInputs = document.querySelectorAll('.otp-field');

        function notify(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerHTML = '';
            const ico = document.createElement('i');
            ico.setAttribute('data-lucide', type === 'success' ? 'check-circle-2' : 'alert-circle');
            ico.classList.add('w-5');
            toast.appendChild(ico);
            toast.appendChild(document.createTextNode(msg));
            toast.className = `absolute top-6 left-6 right-6 p-4 rounded-[20px] flex items-center gap-3 text-sm font-bold z-[100] shadow-lg ${type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-rose-50 text-rose-700 border border-rose-100'}`;
            toast.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        function toggleView(mode) {
            currentMode = mode;
            content.classList.remove('view-active');
            
            setTimeout(() => {
                card.classList.toggle('is-signup', mode === 'signup');
                
                ['names-row', 'dept-row', 'pw-group', 'otp-group', 'forgot-wrap', 'email-group'].forEach(id => {
                    document.getElementById(id).classList.add('hidden');
                });

                if (mode === 'login') {
                    viewTitle.textContent = 'Log In';
                    viewSubtitle.textContent = 'Secure Authentication Required.';
                    actionLabel.textContent = 'Log In';
                    switchBtn.textContent = 'Create Account';
                    footerLabel.textContent = "New User?";
                    document.getElementById('email-group').classList.remove('hidden');
                    document.getElementById('pw-group').classList.remove('hidden');
                    document.getElementById('forgot-wrap').classList.remove('hidden');
                } else if (mode === 'signup') {
                    viewTitle.textContent = 'Sign Up';
                    viewSubtitle.textContent = 'Register Your EuFile Profile.';
                    actionLabel.textContent = 'Create Account';
                    switchBtn.textContent = 'Log In';
                    footerLabel.textContent = "Already A Member?";
                    document.getElementById('names-row').classList.remove('hidden');
                    document.getElementById('dept-row').classList.remove('hidden');
                    document.getElementById('email-group').classList.remove('hidden');
                    document.getElementById('pw-group').classList.remove('hidden');
                } else if (mode === 'forgot') {
                    viewTitle.textContent = 'Reset Access';
                    viewSubtitle.textContent = 'Enter Your Email To Recover Account.';
                    actionLabel.textContent = 'Send OTP';
                    switchBtn.textContent = 'Back To Login';
                    footerLabel.textContent = "Remembered Code?";
                    document.getElementById('email-group').classList.remove('hidden');
                } else if (mode === 'verify') {
                    viewTitle.textContent = 'Verify OTP';
                    viewSubtitle.textContent = 'Enter The 6-Digit Code Sent To Your Mail.';
                    actionLabel.textContent = 'Verify Code';
                    document.getElementById('otp-group').classList.remove('hidden');
                    startTimer();
                } else if (mode === 'reset') {
                    viewTitle.textContent = 'New Password';
                    viewSubtitle.textContent = 'Create A Secure New Password.';
                    actionLabel.textContent = 'Update Password';
                    document.getElementById('pw-group').classList.remove('hidden');
                }

                lucide.createIcons();
                setTimeout(() => content.classList.add('view-active'), 50);
            }, 400);
        }

        otpInputs.forEach((input, i) => {
            input.addEventListener('input', e => {
                if (e.target.value && i < otpInputs.length - 1) otpInputs[i+1].focus();
            });
            input.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) otpInputs[i-1].focus();
            });
        });

        function startTimer() {
            let time = 60;
            const btn = document.getElementById('resend-btn');
            const display = document.getElementById('timer');
            btn.disabled = true;
            const interval = setInterval(() => {
                time--;
                display.textContent = time;
                if (time <= 0) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.textContent = "Resend Now";
                }
            }, 1000);
        }

        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                const icon = btn.querySelector('i');
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                icon.setAttribute('data-lucide', isPass ? 'eye-off' : 'eye');
                lucide.createIcons();
            });
        });

        document.getElementById('go-forgot').addEventListener('click', () => toggleView('forgot'));
        switchBtn.addEventListener('click', () => {
            toggleView(currentMode === 'login' ? 'signup' : 'login');
        });

        document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const currentLabel = actionLabel.textContent;

            btn.disabled = true;
            actionLabel.textContent = 'Processing...';

            let endpoint = '';
            let payload = { email: mailIn.value };

            if (currentMode === 'login') {
                endpoint = '../Backend/login.php';
                payload.password = passIn.value;
            } else if (currentMode === 'signup') {
                endpoint = '../Backend/register.php';
                payload.first_name = document.getElementById('fname').value;
                payload.last_name = document.getElementById('lname').value;
                payload.dept_id = document.getElementById('department').value;
                payload.password = passIn.value;
            } else if (currentMode === 'forgot') {
                endpoint = 'forgot_password.php';
            } else if (currentMode === 'verify') {
                endpoint = 'verify_otp.php';
                payload.otp = Array.from(otpInputs).map(i => i.value).join('');
            } else if (currentMode === 'reset') {
                endpoint = 'reset_password.php';
                payload.password = passIn.value;
            }

            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    notify(data.msg, 'success');
                    if (currentMode === 'forgot') toggleView('verify');
                    else if (currentMode === 'verify') toggleView('reset');
                    else if (currentMode === 'reset' || currentMode === 'signup') toggleView('login');
                    else if (currentMode === 'login') window.location.href = '../Landing/Dashboard.html';
                } else {
                    notify(data.msg, 'error');
                }
            })
            .catch(() => notify('Server Connection Failed.', 'error'))
            .finally(() => {
                btn.disabled = false;
                actionLabel.textContent = currentLabel;
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetch('../Backend/get_departments.php')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('department');
                    data.forEach(dept => {
                        const opt = document.createElement('option');
                        opt.value = dept.id;
                        opt.textContent = dept.name;
                        select.appendChild(opt);
                    });
                });
        });
    </script>
</body>
</html>
